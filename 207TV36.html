    <h1>原神抽卡期望</h1>
<h2 id="概括">概括</h2>
<p><strong>结论</strong>：出金期望值为 62.29733203<br>
<strong>数据来源</strong>：<a target="_blank" rel="external nofollow noopener noreferrer" href="https://www.miyoushe.com/ys/article/60774173">一文说清原神抽卡概率（附每抽对应概率表）</a></p>
<h2 id="简单处理">简单处理</h2>
<p>我将原图数据转成了 .json，以方便调用。</p>
<p>结构如下：</p>
<figure class="highlight json"><table><tr><td class="code"><pre><code class="hljs json"><span class="hljs-punctuation">&#123;</span><br>    <span class="hljs-attr">&quot;Table 1&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><br>        <span class="hljs-punctuation">&#123;</span><br>            <span class="hljs-attr">&quot;抽数&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">1</span><span class="hljs-punctuation">,</span><br>            <span class="hljs-attr">&quot;该次抽中概率&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.6</span><span class="hljs-punctuation">,</span><br>            <span class="hljs-attr">&quot;总抽中概率&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.6</span><br>        <span class="hljs-punctuation">&#125;</span><span class="hljs-punctuation">,</span><br>        <span class="hljs-punctuation">&#123;</span><br>            <span class="hljs-attr">&quot;抽数&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">2</span><span class="hljs-punctuation">,</span><br>            <span class="hljs-attr">&quot;该次抽中概率&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.6</span><span class="hljs-punctuation">,</span><br>            <span class="hljs-attr">&quot;总抽中概率&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">1.1964</span><br>        <span class="hljs-punctuation">&#125;</span><br>    <span class="hljs-punctuation">]</span><br><span class="hljs-punctuation">&#125;</span><br></code></pre></td></tr></table></figure>
<h2 id="计算">计算</h2>
<figure class="highlight python"><table><tr><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">import</span> json<br><br><span class="hljs-keyword">with</span> <span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;概率表.json&quot;</span>, <span class="hljs-string">&quot;r&quot;</span>, encoding=<span class="hljs-string">&quot;utf-8&quot;</span>) <span class="hljs-keyword">as</span> data_file:<br>    data = json.load(data_file)<br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">expectation</span>(<span class="hljs-params">data, i</span>):<br>    <span class="hljs-comment"># i 为抽取次数,输出对应概率</span><br>    <span class="hljs-keyword">match</span> i:<br>        <span class="hljs-keyword">case</span> <span class="hljs-number">1</span>:<br>            Prob = <span class="hljs-number">0.6</span><br>        <span class="hljs-keyword">case</span> <span class="hljs-number">2</span>:<br>            Prob = <span class="hljs-number">0.5964</span><br>        <span class="hljs-keyword">case</span> _:<br>            Prob = (<br>                data[<span class="hljs-string">&quot;Table 1&quot;</span>][i - <span class="hljs-number">1</span>][<span class="hljs-string">&quot;总抽中概率&quot;</span>]<br>                - data[<span class="hljs-string">&quot;Table 1&quot;</span>][i - <span class="hljs-number">2</span>][<span class="hljs-string">&quot;总抽中概率&quot;</span>]<br>            )<br>    Prob = Prob / <span class="hljs-number">100</span><br>    <span class="hljs-keyword">return</span> Prob<br><br>i = <span class="hljs-built_in">len</span>(data[<span class="hljs-string">&quot;Table 1&quot;</span>])<br>sum0 = <span class="hljs-number">0</span><br><span class="hljs-keyword">while</span> i &gt; <span class="hljs-number">0</span>:<br>    i -= <span class="hljs-number">1</span><br>    Extra_num = data[<span class="hljs-string">&quot;Table 1&quot;</span>][i][<span class="hljs-string">&quot;抽数&quot;</span>]<br>    Prob = expectation(data, i + <span class="hljs-number">1</span>)<br>    sum0 += Extra_num * Prob<br><span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;期望为&quot;</span>, sum0)<br></code></pre></td></tr></table></figure>

    
  </article>
